name: Đúc Bùa APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clone mã nguồn về máy ảo
      uses: actions/checkout@v4

    - name: Cài đặt môi trường Java (JDK 11)
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Cấp quyền chạy cho Gradle
      run: chmod +x gradlew

    - name: Tiến hành Build APK (Release)
      run: ./gradlew assembleRelease

    - name: Thu hoạch chiến lợi phẩm
      uses: actions/upload-artifact@v4
      with:
        name: Thanh-Pham-APK
        path: app/build/outputs/apk/release/*.apk
