name: Build ApkSignatureKillerEx

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kéo mã nguồn của lão L-JINBIN về
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài Java 17 (Bản này cực chuẩn cho Gradle 7.4)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      # Bước 3: Cấp quyền chạy cho file gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Bước 4: Ra lệnh cho máy chủ bắt đầu build
      - name: Build with Gradle
        run: ./gradlew assembleRelease

      # Bước 5: Gom hàng APK gửi cho Bình Pro tải về
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ApkSignatureKillerEx-ThanhPham
          path: app/build/outputs/apk/release/*.apk
